<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Banner 產生器｜uniXecure</title>
    <link rel="icon" href="https://www.unixecure.com/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../style.css">
<style>
  /* --- Banner 專屬工具樣式 --- */
  .file-upload-wrapper { display: flex; align-items: center; gap: 10px; width: 100%; }
  .file-upload-btn { background: #f1f5f9; border: 1px solid var(--border-color); padding: 9px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; color: var(--text-main); white-space: nowrap; }
  .file-upload-btn:hover { background: #e2e8f0; }
  input[type="file"] { display: none; }
  .color-picker-group { display: flex; gap: 15px; margin-bottom: 18px; padding: 10px; background: #f8fafc; border-radius: 6px; border: 1px solid var(--border-color); flex-wrap: wrap; }
  .color-item { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: bold; width: 100%; }
  .color-item input[type="color"] { border: none; width: 30px; height: 30px; cursor: pointer; background: none; padding: 0; }
  
  /* --- 畫布預覽區樣式 --- */
  .preview-container { background-color: #e2e8f0; align-items: center; justify-content: center; padding: 40px; overflow: auto; }
  .canvas-wrapper { background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 100%; height: auto; display: flex; margin: auto; }
  canvas { display: block; width: 100%; height: auto; max-height: calc(100vh - 80px); object-fit: contain; }
</style>
</head>
<body class="tool-layout">

  <div class="sidebar">
    <a href="../index.html" class="back-to-home">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        返回主頁
    </a>
    <div class="header">
      <h1>Banner 產生器｜uniXecure</h1>
      <p>標準 1200x450 完美置中排版，支援動態延展與長文案斷行。</p>
    </div>

    <div class="color-picker-group">
      <div class="color-item">
        主色系設定: 
        <input type="color" id="f-color" value="#3c49ba" oninput="updatePrimaryColor()">
        <button type="button" class="toolbar-btn" style="margin-left: auto; border: 1px solid #ccc; border-radius: 4px;" onclick="resetPrimaryColor()">↻ 恢復預設藍</button>
      </div>
    </div>

    <div class="form-group">
      <label>背景裝飾風格</label>
      <select id="f-bg-style" class="input-field" onchange="drawCanvas()">
        <option value="solid">純白俐落 (Solid White)</option>
        <option value="dots" selected>科技點陣 (Dot Matrix)</option>
        <option value="gradient">微光漸層 (Gradient)</option>
      </select>
    </div>

    <div class="form-group">
      <label>主辦單位 Logo URL (支援網址或本機上傳)</label>
      <div class="file-upload-wrapper">
        <input type="text" id="f-logo-url" class="input-field" value="../assets/logos/unixecure/full.svg" oninput="loadLogoUrl()" style="margin-bottom: 0;">
        <label class="file-upload-btn">
          上傳檔案
          <input type="file" id="f-logo" accept="image/png, image/jpeg, image/svg+xml" onchange="handleImageUpload(event, 'logo')">
        </label>
      </div>
    </div>

    <div class="form-group">
      <label>活動標籤</label>
      <input type="text" id="f-tag" class="input-field" value="教育訓練" oninput="drawCanvas()">
    </div>

    <div class="form-group">
      <label>活動主標題</label>
      <div class="toolbar">
        <button type="button" class="toolbar-btn" onclick="setTextColor('primary')" style="color: var(--primary); font-weight: bold;">主色</button>
        <button type="button" class="toolbar-btn" onclick="setTextColor('#1e293b')" style="color: #1e293b; font-weight: bold;">黑色</button>
      </div>
      <div id="f-title" contenteditable="true" style="width: 100%; min-height: 80px; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px; font-weight: bold; line-height: 1.6; background: #fff; outline: none; transition: 0.2s;" onfocus="this.style.borderColor='var(--primary)';" onblur="this.style.borderColor='var(--border-color)';" oninput="drawCanvas()">智慧資安科技 2026 年度<br>前瞻技術與防禦高峰會</div>
    </div>

    <div class="form-group">
      <label>活動時間或小標</label>
      <input type="text" id="f-date" class="input-field" value="2026/08/15 (四) 14:00-16:00" oninput="drawCanvas()">
    </div>

    <div class="section-card">
      <label class="section-card-header">
        <input type="checkbox" id="f-show-cta" checked onchange="toggleSection('cta-fields', this.checked); drawCanvas()"> 包含底部「立即報名」按鈕
      </label>
      <div id="cta-fields">
        <input type="text" id="f-cta-text" class="input-field" value="立即報名" oninput="drawCanvas()" style="margin-bottom: 0;">
      </div>
    </div>

    <div class="section-card">
      <label class="section-card-header">
        <input type="checkbox" id="f-show-speaker" checked onchange="toggleSection('speaker-fields', this.checked); drawCanvas()"> 包含右側講者資訊
      </label>
      <div id="speaker-fields">
        <div class="form-group">
          <label>講者照片 (自動裁切為圓形)</label>
          <div class="file-upload-wrapper">
            <label class="file-upload-btn">
              選擇檔案
              <input type="file" id="f-speaker-img" accept="image/png, image/jpeg" onchange="handleImageUpload(event, 'speaker')">
            </label>
          </div>
        </div>

        <div class="form-group">
          <label>講者姓名</label>
          <input type="text" id="f-speaker-name" class="input-field" value="王大明" oninput="drawCanvas()">
        </div>

        <div class="form-group" style="margin-bottom: 0;">
          <label>講者職稱 / 單位 (支援長文案與自動換行)</label>
          <textarea id="f-speaker-title" class="input-field" style="min-height: 70px; resize: vertical; margin-bottom: 0;" oninput="drawCanvas()">資深技術顧問
解決方案專家</textarea>
        </div>
      </div>
    </div>

    <button class="btn-download" onclick="downloadBanner()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      下載 Banner 圖片 (PNG)
    </button>
  </div>

  <div class="preview-container">
    <div class="canvas-wrapper">
      <canvas id="bannerCanvas"></canvas>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('bannerCanvas');
    const ctx = canvas.getContext('2d');
    
    let images = {
      logo: null,
      speaker: null
    };

    let currentPrimaryHex = '#3c49ba';

    function hexToRgb(hex) {
      let r = parseInt(hex.slice(1, 3), 16) || 0;
      let g = parseInt(hex.slice(3, 5), 16) || 0;
      let b = parseInt(hex.slice(5, 7), 16) || 0;
      return `rgb(${r}, ${g}, ${b})`;
    }

    function hexToRgba(hex, alpha) {
      let r = parseInt(hex.slice(1, 3), 16) || 0;
      let g = parseInt(hex.slice(3, 5), 16) || 0;
      let b = parseInt(hex.slice(5, 7), 16) || 0;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function resetPrimaryColor() {
      document.getElementById('f-color').value = '#3c49ba';
      updatePrimaryColor();
    }

    function updatePrimaryColor() {
      const newHex = document.getElementById('f-color').value;
      const oldRgb = hexToRgb(currentPrimaryHex);
      const newRgb = hexToRgb(newHex);
      
      const titleEl = document.getElementById('f-title');
      titleEl.innerHTML = titleEl.innerHTML.replace(new RegExp(currentPrimaryHex, 'gi'), newHex);
      titleEl.innerHTML = titleEl.innerHTML.replace(new RegExp(oldRgb.replace('(', '\\(').replace(')', '\\)'), 'gi'), newRgb);
      
      currentPrimaryHex = newHex;
      document.documentElement.style.setProperty('--primary', newHex);
      drawCanvas();
    }

    function setTextColor(hexCode) {
      const color = hexCode === 'primary' ? currentPrimaryHex : hexCode;
      document.execCommand('styleWithCSS', false, true);
      document.execCommand('foreColor', false, color);
      drawCanvas();
    }

    function toggleSection(id, show) {
      document.getElementById(id).style.display = show ? 'block' : 'none';
    }

    // 載入網址 Logo (防 CORS 崩潰機制)
   

    function handleImageUpload(event, type) {
      const file = event.target.files[0];
      if (!file) return;
      if (type === 'logo') {
        document.getElementById('f-logo-url').value = ''; // 若上傳本機檔案則清空網址列
      }
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() { images[type] = img; drawCanvas(); }
        img.src = e.target.result;
      }
      reader.readAsDataURL(file);
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function getTokensFromNode(node, defaultColor) {
      let tokens = [];
      function traverse(n, color) {
        if (n.nodeType === 3) {
          let text = n.textContent;
          let parts = text.match(/([a-zA-Z0-9]+|\s|.)/g) || [];
          parts.forEach(p => tokens.push({ text: p, color: color }));
        } else if (n.nodeType === 1) {
          if (n.tagName === 'BR' || n.tagName === 'DIV' || n.tagName === 'P') {
            if (tokens.length > 0 && tokens[tokens.length-1].text !== '\n') {
              tokens.push({ text: '\n', color: color });
            }
          }
          let c = color;
          if (n.style && n.style.color) c = n.style.color;
          else if (n.tagName === 'FONT' && n.color) c = n.color;
          n.childNodes.forEach(child => traverse(child, c));
        }
      }
      traverse(node, defaultColor);
      return tokens;
    }

    function measureColoredText(ctx, tokens, maxWidth, lineHeight) {
      let cx = 0;
      let lines = 1;
      for (let i = 0; i < tokens.length; i++) {
        let token = tokens[i];
        if (token.text === '\n') { cx = 0; lines++; continue; }
        let w = ctx.measureText(token.text).width;
        if (cx + w > maxWidth && cx !== 0 && token.text.trim() !== '') {
          cx = 0; lines++;
        }
        cx += w;
      }
      return lines * lineHeight;
    }

    function drawColoredText(ctx, tokens, x, y, maxWidth, lineHeight) {
      ctx.textBaseline = 'top';
      let cx = x;
      let cy = y;
      for (let i = 0; i < tokens.length; i++) {
        let token = tokens[i];
        if (token.text === '\n') { cx = x; cy += lineHeight; continue; }
        
        ctx.fillStyle = token.color;
        let w = ctx.measureText(token.text).width;
        
        if (cx + w > x + maxWidth && cx !== x && token.text.trim() !== '') {
          cx = x; cy += lineHeight;
        }
        ctx.fillText(token.text, cx, cy);
        cx += w;
      }
      ctx.textBaseline = 'alphabetic';
    }

    function drawWrappedTextCentered(ctx, text, x, y, maxWidth, lineHeight) {
      let paragraphs = (text || "").split('\n');
      let cy = y;
      
      paragraphs.forEach(paragraph => {
        let chars = paragraph.split('');
        let line = '';
        for (let n = 0; n < chars.length; n++) {
          let testLine = line + chars[n];
          let metrics = ctx.measureText(testLine);
          if (metrics.width > maxWidth && n > 0) {
            ctx.fillText(line, x, cy);
            line = chars[n];
            cy += lineHeight;
          } else {
            line = testLine;
          }
        }
        ctx.fillText(line, x, cy);
        cy += lineHeight;
      });
    }

    // --- 核心排版引擎 ---
    function drawCanvas() {
      // 加入防呆層，如果繪圖拋出錯誤，會直接在畫布上顯示紅字，確保不會「一片空白」
      try {
        const showSpeaker = document.getElementById('f-show-speaker').checked;
        const showCta = document.getElementById('f-show-cta').checked;
        const primaryColor = document.getElementById('f-color').value;
        const bgStyle = document.getElementById('f-bg-style').value;
        const tagText = document.getElementById('f-tag').value || "";
        const dateText = document.getElementById('f-date').value || "";

        const elementGap = 26;

        // 1. 測量 Logo & Tag 區塊
        const logoH = 45;
        const tagH = 45;
        const row1H = (images.logo || tagText) ? Math.max(logoH, tagH) : 0;

        // 2. 測量標題區塊
        ctx.font = 'bold 58px "Microsoft JhengHei", sans-serif';
        const titleEl = document.getElementById('f-title');
        const titleTokens = getTokensFromNode(titleEl, '#1e293b');
        const maxTitleW = showSpeaker ? 700 : 1050;
        const titleLineH = 75;
        const row2H = measureColoredText(ctx, titleTokens, maxTitleW, titleLineH);

        // 3. 測量時間與按鈕
        const row3H = dateText ? 32 : 0;
        const row4H = showCta ? 60 : 0;

        // 計算總內容高度
        let rows = [];
        if (row1H > 0) rows.push(row1H);
        if (row2H > 0) rows.push(row2H);
        if (row3H > 0) rows.push(row3H);
        if (row4H > 0) rows.push(row4H);
        
        const totalContentH = rows.reduce((sum, h) => sum + h, 0) + (rows.length > 1 ? (rows.length - 1) * elementGap : 0);

        // 4. 設定 Canvas 尺寸 (扁預設: 1200x450)
        const PRESET_FLAT_HEIGHT = 450; 
        let finalHeight = Math.max(PRESET_FLAT_HEIGHT, totalContentH + 120); 
        if (showSpeaker) {
          finalHeight = Math.max(finalHeight, 380 + 80); 
        }

        canvas.width = 1200;
        canvas.height = finalHeight;

        // 繪製背景
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (bgStyle === 'dots') {
          ctx.fillStyle = hexToRgba(primaryColor, 0.15);
          for (let x = 25; x < canvas.width; x += 35) {
            for (let y = 25; y < canvas.height; y += 35) {
              ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI * 2); ctx.fill();
            }
          }
        } else if (bgStyle === 'gradient') {
          const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
          gradient.addColorStop(0, '#ffffff');
          gradient.addColorStop(1, hexToRgba(primaryColor, 0.15));
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // 5. 計算完美置中 Y 軸
        let currentY = (finalHeight - totalContentH) / 2;

        // [Row 1] Logo & Tag
        if (row1H > 0) {
          let tagStartX = 60;
          if (images.logo && images.logo.height > 0) {
            const logoScale = logoH / images.logo.height;
            const logoW = images.logo.width * logoScale;
            ctx.drawImage(images.logo, 60, currentY, logoW, logoH);
            tagStartX += logoW + 24;
          }
          
          if (tagText) {
            ctx.font = 'bold 22px "Microsoft JhengHei", sans-serif';
            const tagW = ctx.measureText(tagText).width + 40;
            ctx.fillStyle = primaryColor;
            ctx.fillRect(tagStartX, currentY, tagW, tagH); 
            
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(tagText, tagStartX + tagW / 2, currentY + tagH / 2);
            ctx.textAlign = 'left';
            ctx.textBaseline = 'alphabetic';
          }
          currentY += row1H + elementGap;
        }

        // [Row 2] Title
        ctx.font = 'bold 58px "Microsoft JhengHei", sans-serif';
        drawColoredText(ctx, titleTokens, 60, currentY, maxTitleW, titleLineH);
        currentY += row2H + elementGap;

        // [Row 3] Date
        if (row3H > 0) {
          ctx.fillStyle = '#333333';
          ctx.font = 'bold 32px "Microsoft JhengHei", sans-serif';
          ctx.textBaseline = 'top';
          ctx.fillText(dateText, 60, currentY);
          ctx.textBaseline = 'alphabetic';
          currentY += row3H + elementGap;
        }

        // [Row 4] CTA Button
        if (row4H > 0) {
          ctx.fillStyle = '#ffb415';
          roundRect(ctx, 60, currentY, 200, row4H, 6);
          ctx.fill();
          
          ctx.fillStyle = '#21234a';
          ctx.font = 'bold 24px "Microsoft JhengHei", sans-serif';
          const ctaText = document.getElementById('f-cta-text').value || "立即報名";
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(ctaText, 160, currentY + row4H / 2);
          ctx.textAlign = 'left';
          ctx.textBaseline = 'alphabetic';
        }

        // 6. 繪製右側講者卡片
        if (showSpeaker) {
          const cardW = 280;
          const cardH = 380;
          const cardX = 860;
          const cardY = (finalHeight - cardH) / 2;
          
          // 陰影 (更淺、更糊、主色系)
          ctx.shadowColor = hexToRgba(primaryColor, 0.12);
          ctx.shadowBlur = 40;
          ctx.shadowOffsetY = 15;
          ctx.fillStyle = '#ffffff';
          roundRect(ctx, cardX, cardY, cardW, cardH, 16);
          ctx.fill();
          
          ctx.shadowColor = 'transparent';

          const imgRadius = 90;
          const imgX = cardX + cardW / 2;
          const imgY = cardY + 130;

          ctx.save();
          ctx.beginPath();
          ctx.arc(imgX, imgY, imgRadius, 0, Math.PI * 2, true);
          ctx.closePath();
          ctx.clip();

          if (images.speaker && images.speaker.width > 0) {
            const size = Math.min(images.speaker.width, images.speaker.height);
            const sx = (images.speaker.width - size) / 2;
            const sy = (images.speaker.height - size) / 2;
            ctx.drawImage(images.speaker, sx, sy, size, size, imgX - imgRadius, imgY - imgRadius, imgRadius * 2, imgRadius * 2);
          } else {
            ctx.fillStyle = '#e2e8f0';
            ctx.fill();
          }
          ctx.restore();

          const speakerName = document.getElementById('f-speaker-name').value || "";
          ctx.textAlign = 'center';
          ctx.fillStyle = '#1e293b';
          ctx.font = 'bold 28px "Microsoft JhengHei", sans-serif';
          ctx.fillText(speakerName, cardX + cardW / 2, cardY + 280);

          const speakerTitle = document.getElementById('f-speaker-title').value || "";
          ctx.fillStyle = '#64748b';
          ctx.font = '18px "Microsoft JhengHei", sans-serif';
          drawWrappedTextCentered(ctx, speakerTitle, cardX + cardW / 2, cardY + 315, cardW - 40, 26);
          
          ctx.textAlign = 'left';
        }

      } catch (err) {
        // 防護網：如果有語法或取值錯誤，將直接在畫布印出紅字，而不會一片空白
        canvas.width = 1200; canvas.height = 450;
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 1200, 450);
        ctx.fillStyle = '#E1251B'; ctx.font = '24px sans-serif';
        ctx.fillText('繪圖發生錯誤，請檢查輸入內容：', 50, 100);
        ctx.fillText(err.message, 50, 140);
        console.error(err);
      }
    }

    // 載入網址 Logo (防 CORS 崩潰機制升級版)
function loadLogoUrl() {
  const url = document.getElementById('f-logo-url').value.trim();
  if (!url) {
    images.logo = null;
    drawCanvas();
    return;
  }
  
  const img = new Image();
  img.crossOrigin = "Anonymous"; // 第一次嘗試：標準跨域請求
  img.onload = () => { images.logo = img; drawCanvas(); };
  img.onerror = () => { 
    // 第一次失敗時，使用 CORS Proxy 代理服務繞過限制
    const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
    const proxyImg = new Image();
    proxyImg.crossOrigin = "Anonymous";
    
    proxyImg.onload = () => { images.logo = proxyImg; drawCanvas(); };
    proxyImg.onerror = () => { 
      // 如果代理也失敗，清空圖片並提示使用者
      alert("無法載入該網址的圖片。伺服器阻擋了存取，請改用「上傳本地圖片」功能。");
      images.logo = null; 
      drawCanvas(); 
    };
    
    proxyImg.src = proxyUrl;
  };
  
  img.src = url;
}

// 執行下載並捕捉錯誤
function downloadBanner() {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  
  try {
    // 嘗試輸出圖片
    const dataUrl = canvas.toDataURL('image/png');
    const link = document.createElement('a');
    link.download = `${yyyy}${mm}${dd}_banner.png`;
    link.href = dataUrl;
    link.click();
  } catch (error) {
    // 捕捉 Canvas 污染造成的安全性錯誤
    if (error.name === "SecurityError") {
      alert("下載失敗：因為載入了外部網址的圖片，基於瀏覽器安全性 (CORS) 阻擋了下載功能。\n\n解決方法：請將該 Logo 下載到電腦中，改用「上傳檔案」的方式加入，即可正常下載。");
    } else {
      alert("下載時發生未知的錯誤：" + error.message);
    }
  }
}

    window.onload = () => {
      loadLogoUrl();
      drawCanvas();
    };
  </script>
</body>
</html>
