<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>eDM 產生器｜uniXecure</title>
    <link rel="icon" href="https://www.unixecure.com/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="tool-layout">

  <div class="sidebar">
    <a href="../index.html" class="back-to-home">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        返回主頁
    </a>
    <div class="header">
      <h1>eDM 產生器｜uniXecure</h1>
      <p>修改左側欄位，右側即時更新。您的編輯內容會<strong>自動存檔</strong>。<br>拖曳 <span style="color:var(--primary)">:::</span> 可進行排序。</p>
    </div>

    <div class="form-group">
      <label>主視覺 Banner URL</label>
      <div style="display:flex; gap:10px; align-items:center;">
        <img id="banner-thumb" class="thumb-preview" src="">
        <input type="text" id="f-banner" class="input-field" style="margin-bottom:0" value="https://www.unixecure.com/images/index-banner-image.png" oninput="updateThumb('f-banner','banner-thumb')">
      </div>
    </div>

    <div class="form-group">
      <label>活動主標題 (顯示於信件與瀏覽器標籤)</label>
      <input type="text" id="f-title" class="input-field" value="零信任世界中的 AI 安全金融">
    </div>

    <div class="form-group">
      <label>活動簡介</label>
      <div class="toolbar">
        <button type="button" class="toolbar-btn" onclick="execCmd('bold')" style="font-weight: bold;">B</button>
        <button type="button" class="toolbar-btn" onclick="execCmd('underline')" style="text-decoration: underline;">U</button>
        <button type="button" class="toolbar-btn" onclick="execCmd('insertUnorderedList')">&bull; 列表</button>
        <button type="button" class="toolbar-btn" onclick="execCmd('foreColor', 'var(--primary)')" style="color: var(--primary); font-weight: bold;">藍</button>
        <button type="button" class="toolbar-btn" onclick="execCmd('foreColor', '#E1251B')" style="color: var(--danger); font-weight: bold;">紅</button>
        <button type="button" class="toolbar-btn" onclick="execCmd('foreColor', '#333333')" style="color: #333; font-weight: bold;">黑</button>
      </div>
      <div id="f-desc" class="editor-box" contenteditable="true" style="border: 1px solid var(--border-color); border-radius: 6px; background:#fff; height:auto; min-height:120px; line-height:1.8; font-size:15px; padding:10px; outline: none; transition: border-color 0.2s;" oninput="updatePreview()">人工智慧加速金融創新，同時帶來資安與合規新挑戰。誠邀您參與活動，深入了解如何在零信任架構下強化 AI 存取控管、資料保護與風險治理。<br>本活動為聚焦金融業 AI 應用下的資安與合規挑戰，將分享分段技術於跨據點安全連線的實務應用，解析如何兼顧監管要求與數位轉型，打造高韌性且安全的營運環境，以及解析零信任架構如何強化存取控管與資料保護。</div>
    </div>

    <div class="form-group">
      <label>活動名稱 (顯示於資訊內)</label>
      <input type="text" id="f-event-name" class="input-field" value="零信任世界中的 AI 安全金融">
    </div>

    <div class="form-group">
      <label>活動時間</label>
      <input type="text" id="f-date" class="input-field" value="">
    </div>

    <div class="form-group">
      <label>活動地點</label>
      <input type="text" id="f-location" class="input-field" value="智慧資安科技（台北市內湖區瑞光路318號7樓）" placeholder="輸入地點名稱">
      <input type="text" id="f-location-url" class="input-field" value="" placeholder="地點超連結 (如 Google Map 或 Teams 網址，選填)">
    </div>

    <div class="section-card">
      <div class="section-card-header">
        <input type="checkbox" id="f-has-agenda" checked onchange="toggleSection('agenda-section', this.checked)">
        包含議程表
      </div>
      <div id="agenda-section">
        <div id="agenda-list">
        </div>
        <button type="button" onclick="addAgendaItem()" style="font-size: 13px; padding: 10px; cursor: pointer; border: 1px dashed var(--border-color); border-radius: 4px; background: #fff; width: 100%; margin-top:10px;">+ 新增議程</button>
      </div>
    </div>

    <div class="section-card">
      <div class="section-card-header">
        <input type="checkbox" id="f-has-organizer" checked onchange="toggleSection('organizer-section', this.checked)">
        包含主辦單位
      </div>
      <div id="organizer-section">
        <p style="font-size:12px; color:var(--danger); margin-bottom:10px;">建議使用 PNG/JPG 避免破圖</p>
        <div id="logo-list">
        </div>
        <button type="button" onclick="addLogoItem()" style="font-size: 13px; padding: 10px; cursor: pointer; border: 1px dashed var(--border-color); border-radius: 4px; background: #fff; width: 100%; margin-top:10px;">+ 新增 Logo</button>
      </div>
    </div>

    <div class="form-group">
      <label>聯絡窗口</label>
      <textarea id="f-contact" class="input-field" style="min-height:80px; resize: vertical;">智慧資安科技股份有限公司 Sylvia Huang
電話：+886-2-87986088 #1634
信箱：sylviahuang@unixecure.com.tw</textarea>
    </div>

    <div class="form-group">
      <label>報名按鈕文字</label>
      <input type="text" id="f-btn-text" class="input-field" value="立即報名">
    </div>

    <div class="form-group">
      <label>報名網址 (URL)</label>
      <input type="text" id="f-link" class="input-field" value="https://tw.systex.com/">
    </div>
    
    <div class="form-group">
      <label>提醒事項 (顯示於按鈕下方，選填)</label>
      <input type="text" id="f-reminder" class="input-field" value="數量有限，報名從速" placeholder="例：數量有限，報名從速">
    </div>
    
    <div class="form-group">
      <label>注意事項 (置於最底部，灰色小字)</label>
      <textarea id="f-notice" class="input-field" style="min-height:150px; resize: vertical;">注意事項
1. 主辦單位確認您的報名資料後，將於活動前寄發提醒函，屆時請留意報名填寫之 email 信箱。
2. 主辦單位保留報名資格審核權，請勿偽造他人身分資料以免觸犯法律。
3. 主辦單位保留變更活動內容、日期、地點等修改權利。
4. 以上活動若適逢天災等不可抗拒之因素，依照行政院人事行政總處或臺北市政府公佈之規定，決定延期與否，不再另行通知，敬請見諒。
5. 主辦單位將有權利進行個人資料之蒐集處理及利用
6. 名額有限，盡速報名，主辦單位保有名單調整之權利</textarea>
    </div>

    <button class="btn-download" onclick="downloadHTML()" style="margin-bottom: 10px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      下載 EDM HTML 檔
    </button>
    
    <button class="btn-text-link" onclick="resetData()">🔄 清除記憶，恢復預設值</button>
  </div>

  <div class="preview-container">
    <div class="preview-header">
      <span>即時預覽 (模擬桌面版信箱)</span>
      <span style="font-weight:normal; color:#94a3b8;" id="save-status">已自動存檔</span>
    </div>
    <iframe id="preview-frame"></iframe>
  </div>

  <script src="../js/common.js" defer></script>
  <script src="script.js" defer></script>

</body>
</html>
