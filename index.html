<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uniXecure | Marketing Tools Hub</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="dashboard-body">

    <div class="container">
        <div class="dashboard-header">
            <h1>uniXecure 營銷工具中心</h1>
            <p>自動化資產生成器，提升行銷與活動部署效率</p>
        </div>

        <div class="tools-grid">
            <a href="./banner-maker/" class="tool-card">
                <div class="icon-wrapper">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                </div>
                <h2 class="tool-title">Banner 產生器</h2>
                <p class="tool-desc">快速生成標準化視覺素材，適用於社群媒體、網站與活動宣傳板面，確保視覺一致性。</p>
                <div class="action-link">
                    開啟工具
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </div>
            </a>

            <a href="./edm-editor/" class="tool-card">
                <div class="icon-wrapper">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </div>
                <h2 class="tool-title">EDM 編輯器</h2>
                <p class="tool-desc">郵件模板視覺化編輯與輸出工具，內建響應式框架，優化客戶端郵件讀取體驗。</p>
                <div class="action-link">
                    開啟工具
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </div>
            </a>
        </div>
    </div>

</body>
</html>
