<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>行銷設計自動化工具包｜uniXecure</title>
    <link rel="icon" href="https://www.unixecure.com/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
<style>
    /* --- Dashboard 專屬網格與卡片樣式 --- */
    .tools-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 24px;
        margin-top: 40px;
    }
    
    .tool-card {
        background: #ffffff;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 40px 24px;
        text-align: center;
        text-decoration: none;
        transition: all 0.3s ease;
        box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    
    .tool-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 20px rgba(60, 73, 186, 0.1);
        border-color: var(--primary);
    }
    
    .tool-icon {
        width: 64px;
        height: 64px;
        background: #f1f5f9;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        color: var(--primary);
        transition: background 0.3s ease;
    }
    
    .tool-card:hover .tool-icon {
        background: #e0e7ff;
    }
    
    .tool-card h2 {
        font-size: 20px;
        font-weight: bold;
        margin: 0 0 12px 0;
        color: var(--text-main);
    }
    
    .tool-card p {
        font-size: 14px;
        color: var(--text-muted);
        margin: 0;
        line-height: 1.6;
    }
</style>
</head>
<body class="dashboard-body">

    <div class="container">
        <header class="dashboard-header">
            <h1>uniXecure 行銷工具包</h1>
            <p style="color: var(--text-muted); font-size: 16px; margin-top: 8px;">
                統一管理品牌視覺資產，加速行銷素材自動化產出
            </p>
        </header>
        
        <main class="tools-grid">
            
            <a href="./banner-maker/index.html" class="tool-card">
                <div class="tool-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                </div>
                <h2>Banner 自動生成器</h2>
                <p>上傳講者資訊與標題，一鍵生成符合品牌規範的社群宣傳圖與視覺佈景。</p>
            </a>

            <a href="./edm-editor/index.html" class="tool-card">
                <div class="tool-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </div>
                <h2>eDM 視覺化生成器</h2>
                <p>拖曳排序議程並即時預覽，快速產出相容於各大發信軟體的標準 HTML 程式碼。</p>
            </a>

            <a href="./logo-portal/index.html" class="tool-card">
                <div class="tool-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                        <polyline points="2 17 12 22 22 17"></polyline>
                        <polyline points="2 12 12 17 22 12"></polyline>
                    </svg>
                </div>
                <h2>Logo 自助服務站</h2>
                <p>產品線 Logo 集中管理，支援多種排版與單色/反白配置，自訂尺寸完美置中匯出。</p>
            </a>

        </main>
    </div>

<script src="./js/common.js"></script>
</body>
</html>
